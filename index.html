document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ce {\n  font-family: 'Onest'; font-style: normal; font-display: swap; font-weight: 700;\n  src: url(\"d66bf250-94b6-499e-ad0b-c6f23d339e0e\") format('woff2');\n}\n@font-face {\n  font-family: 'Onest'; font-style: normal; font-display: swap; font-weight: 800;\n  src: url(\"0dc0a91e-9e95-43e3-abbb-bf6e290e7a02\") format('woff2');\n}\n@font-face {\n  font-family: 'Onest'; font-style: normal; font-display: swap; font-weight: 900;\n  src: url(\"858e45b8-b21e-4913-946a-94b49b8d5b5e\") format('woff2');\n}\n\n:root {\n  /* ------------------------------------------------------------------------\n     CORE BRAND PALETTE\n     Derived from the logotype gradient. Blue → Purple.\n     ---------------------------------------------------------------------- */\n  --magic-blue:          #38A0FF;    /* primary brand blue  */\n  --magic-purple:        #AA7AFF;    /* primary brand purple */\n  --magic-gradient:      linear-gradient(135deg, #38A0FF 0%, #AA7AFF 100%);\n  --magic-gradient-h:    linear-gradient(90deg,  #38A0FF 0%, #AA7AFF 100%);\n  --magic-gradient-v:    linear-gradient(180deg, #38A0FF 0%, #AA7AFF 100%);\n  --magic-gradient-soft: linear-gradient(135deg, #D9EBFF 0%, #E8DDFF 100%);\n\n  /* Tints (100→900) – tonal stops on the blue axis */\n  --blue-50:  #EAF5FF;\n  --blue-100: #D1E8FF;\n  --blue-200: #A8D3FF;\n  --blue-300: #7ABCFF;\n  --blue-400: #53ACFF;\n  --blue-500: #38A0FF;\n  --blue-600: #1E82E0;\n  --blue-700: #1566B8;\n  --blue-800: #0F4E8F;\n  --blue-900: #0A3560;\n\n  /* Tints on the purple axis */\n  --purple-50:  #F2EBFF;\n  --purple-100: #E4D6FF;\n  --purple-200: #CBB0FF;\n  --purple-300: #B792FF;\n  --purple-400: #AA7AFF;\n  --purple-500: #9561FF;\n  --purple-600: #7A45EB;\n  --purple-700: #5E30C4;\n  --purple-800: #421F94;\n  --purple-900: #2A1266;\n\n  /* ------------------------------------------------------------------------\n     NEUTRALS — near-black / greys / near-white\n     ---------------------------------------------------------------------- */\n  --ink-0:   #FFFFFF;\n  --ink-50:  #F7F8FB;\n  --ink-100: #EEF1F6;\n  --ink-200: #DDE2EB;\n  --ink-300: #C3CAD6;\n  --ink-400: #9AA2B2;\n  --ink-500: #6E7687;\n  --ink-600: #4B5160;\n  --ink-700: #2F3441;\n  --ink-800: #1A1D26;\n  --ink-900: #0C0E14;\n\n  /* ------------------------------------------------------------------------\n     SEMANTIC COLORS\n     ---------------------------------------------------------------------- */\n  --success: #2EC28A;\n  --success-bg: #E4F8EF;\n  --warning: #FFB020;\n  --warning-bg: #FFF3DC;\n  --danger:  #F5525C;\n  --danger-bg: #FFE6E8;\n  --info:    #38A0FF;\n  --info-bg: #EAF5FF;\n\n  /* ------------------------------------------------------------------------\n     SURFACE / BACKGROUND / FOREGROUND tokens (semantic)\n     ---------------------------------------------------------------------- */\n  --bg:              var(--ink-50);\n  --bg-elevated:     var(--ink-0);\n  --bg-subtle:       var(--ink-100);\n  --bg-inverse:      var(--ink-900);\n  --bg-accent-soft:  var(--blue-50);\n\n  --fg:              var(--ink-900);\n  --fg-muted:        var(--ink-600);\n  --fg-subtle:       var(--ink-500);\n  --fg-disabled:     var(--ink-400);\n  --fg-inverse:      var(--ink-0);\n  --fg-accent:       var(--blue-600);\n\n  --border:          var(--ink-200);\n  --border-strong:   var(--ink-300);\n  --border-accent:   var(--blue-500);\n\n  /* ------------------------------------------------------------------------\n     RADII — Magic uses GENEROUSLY rounded corners everywhere\n     ---------------------------------------------------------------------- */\n  --radius-xs: 6px;\n  --radius-sm: 10px;\n  --radius-md: 14px;\n  --radius-lg: 20px;\n  --radius-xl: 28px;\n  --radius-2xl: 36px;\n  --radius-pill: 999px;\n\n  /* ------------------------------------------------------------------------\n     SHADOWS (soft, coloured — matches gradient brand feel)\n     ---------------------------------------------------------------------- */\n  --shadow-xs: 0 1px 2px rgba(20, 30, 60, 0.06);\n  --shadow-sm: 0 2px 6px rgba(20, 30, 60, 0.06), 0 1px 2px rgba(20, 30, 60, 0.04);\n  --shadow-md: 0 8px 20px rgba(20, 30, 60, 0.08), 0 2px 4px rgba(20, 30, 60, 0.04);\n  --shadow-lg: 0 18px 40px rgba(20, 30, 60, 0.10), 0 4px 8px rgba(20, 30, 60, 0.04);\n  --shadow-xl: 0 28px 60px rgba(20, 30, 60, 0.14);\n  --shadow-glow-blue:   0 12px 32px rgba(56, 160, 255, 0.35);\n  --shadow-glow-purple: 0 12px 32px rgba(170, 122, 255, 0.35);\n  --shadow-glow-brand:  0 16px 40px rgba(120, 140, 255, 0.30);\n\n  /* ------------------------------------------------------------------------\n     SPACING — 4pt grid\n     ---------------------------------------------------------------------- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n\n  /* ------------------------------------------------------------------------\n     TYPOGRAPHY\n     Display → ONEST BLACK/BOLD (very heavy, punchy, used for headlines)\n     Body    → ONEST LIGHT/THIN (delicate, open, airy)\n     Contrast between \"жирний\" display and \"тонкий\" body is the brand's\n     signature typographic rhythm.\n     ---------------------------------------------------------------------- */\n  --font-display: 'Onest', system-ui, sans-serif;\n  --font-body:    'Onest', system-ui, sans-serif;\n  --font-mono:    ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;\n\n  /* Weight tokens */\n  --weight-thin:       100;\n  --weight-ultralight: 200;\n  --weight-light:      300;\n  --weight-regular:    400;\n  --weight-medium:     500;\n  --weight-bold:       700;\n  --weight-black:      900;\n\n  /* Type scale (desktop) */\n  --text-display-xl: 112px;\n  --text-display-lg: 88px;\n  --text-display-md: 64px;\n  --text-h1:         48px;\n  --text-h2:         36px;\n  --text-h3:         28px;\n  --text-h4:         22px;\n  --text-h5:         18px;\n  --text-body-lg:    20px;\n  --text-body:       16px;\n  --text-body-sm:    14px;\n  --text-caption:    12px;\n  --text-overline:   11px;\n\n  /* Line heights */\n  --lh-tight:   1.02;   /* for huge display */\n  --lh-heading: 1.1;\n  --lh-body:    1.55;\n  --lh-loose:   1.75;\n\n  /* Letter spacing */\n  --ls-display: -0.03em;   /* negative for big heavy type */\n  --ls-heading: -0.01em;\n  --ls-body:     0em;\n  --ls-caps:     0.08em;   /* for overline / button caps */\n}\n\n/* ==========================================================================\n   SEMANTIC TYPOGRAPHY CLASSES\n   ========================================================================== */\n\nhtml, body {\n  font-family: var(--font-body);\n  font-weight: var(--weight-light);      /* default body = thin/light */\n  font-size: var(--text-body);\n  line-height: var(--lh-body);\n  color: var(--fg);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\n.display-xl, .display-lg, .display-md,\nh1, h2, h3, h4, h5 {\n  font-family: var(--font-display);\n  color: var(--fg);\n  margin: 0;\n  text-wrap: balance;\n}\n\n.display-xl { font-size: var(--text-display-xl); font-weight: var(--weight-black); line-height: var(--lh-tight);   letter-spacing: var(--ls-display); }\n.display-lg { font-size: var(--text-display-lg); font-weight: var(--weight-black); line-height: var(--lh-tight);   letter-spacing: var(--ls-display); }\n.display-md { font-size: var(--text-display-md); font-weight: var(--weight-bold);  line-height: var(--lh-tight);   letter-spacing: var(--ls-display); }\n\nh1, .h1 { font-size: var(--text-h1); font-weight: var(--weight-bold);  line-height: var(--lh-heading); letter-spacing: var(--ls-heading); }\nh2, .h2 { font-size: var(--text-h2); font-weight: var(--weight-bold);  line-height: var(--lh-heading); letter-spacing: var(--ls-heading); }\nh3, .h3 { font-size: var(--text-h3); font-weight: var(--weight-bold);  line-height: var(--lh-heading); letter-spacing: var(--ls-heading); }\nh4, .h4 { font-size: var(--text-h4); font-weight: var(--weight-medium);line-height: var(--lh-heading); }\nh5, .h5 { font-size: var(--text-h5); font-weight: var(--weight-medium);line-height: var(--lh-heading); }\n\np, .body { font-size: var(--text-body); font-weight: var(--weight-light); line-height: var(--lh-body); margin: 0; text-wrap: pretty;}\n.body-lg { font-size: var(--text-body-lg); font-weight: var(--weight-light); line-height: var(--lh-body); }\n.body-sm { font-size: var(--text-body-sm); font-weight: var(--weight-regular); line-height: var(--lh-body); }\n.caption { font-size: var(--text-caption); font-weight: var(--weight-regular); color: var(--fg-muted); }\n.overline { font-size: var(--text-overline); font-weight: var(--weight-medium); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--fg-muted); }\n\n.mono { font-family: var(--font-mono); }\n\n/* Gradient text utility — the signature brand treatment */\n.text-gradient {\n  background: var(--magic-gradient-h);\n  -webkit-background-clip: text;\n          background-clip: text;\n  -webkit-text-fill-color: transparent;\n          color: transparent;\n}\n<\u002Fstyle>\n<style>/* ==========================================================================\n   Lips ID — Growth Forecast — Deck Styles (Magic Agency)\n   ========================================================================== */\n\n* { box-sizing: border-box; }\n\ndeck-stage section {\n  width: 1920px;\n  height: 1080px;\n  position: relative;\n  overflow: hidden;\n  background: #fff;\n  color: var(--ink-900);\n  font-family: var(--font-body);\n}\n\n/* ---------- shared layout primitives ---------- */\n.slide-pad { padding: 80px 96px 100px; height: 100%; display: flex; flex-direction: column; position: relative; z-index: 2; }\n.slide-pad-tight { padding: 64px 80px 90px; height: 100%; display: flex; flex-direction: column; position: relative; z-index: 2; }\n\n.brand-row { display: flex; align-items: center; gap: 14px; }\n.brand-row img { height: 36px; width: auto; }\n.brand-word { font-family: var(--font-display); font-weight: 800; font-size: 26px; letter-spacing: -0.02em; }\n.brand-word.on-dark { color: #fff; }\n\n.eyebrow {\n  display: inline-flex; align-items: center; gap: 10px;\n  font-size: 16px; font-weight: 500; letter-spacing: 0.06em;\n  text-transform: uppercase; color: var(--fg-muted);\n}\n.eyebrow .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--magic-gradient); }\n.eyebrow.on-dark { color: rgba(255,255,255,0.65); }\n\n.slide-num {\n  position: absolute; bottom: 32px; right: 56px;\n  font-size: 13px; font-weight: 500; color: var(--fg-subtle);\n  font-feature-settings: \"tnum\";\n  letter-spacing: 0.04em;\n  z-index: 5;\n}\n.slide-num.on-dark { color: rgba(255,255,255,0.4); }\n.slide-num .of { opacity: 0.45; }\n\n.foot {\n  display: none;\n  position: absolute; bottom: 32px; left: 56px;\n  font-size: 13px; color: var(--fg-subtle); font-weight: 400;\n  letter-spacing: 0.02em; z-index: 5;\n}\n.foot.on-dark { color: rgba(255,255,255,0.45); }\n\n/* ---------- gradient backdrops ---------- */\n.bg-decor { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }\n.blob { position: absolute; border-radius: 999px; filter: blur(70px); opacity: 0.5; }\n.blob.b1 { width: 700px; height: 700px; background: #38A0FF; top: -200px; left: -180px; }\n.blob.b2 { width: 600px; height: 600px; background: #AA7AFF; bottom: -200px; right: -120px; }\n.bar { position: absolute; border-radius: 999px; background: var(--magic-gradient); opacity: 0.10; transform: rotate(-22deg); }\n.bar.r1 { width: 1100px; height: 110px; top: 220px; right: -240px; }\n.bar.r2 { width: 800px; height: 90px; bottom: 200px; left: -180px; }\n\n/* ---------- gradient hero (cover, sections) ---------- */\n.hero-stage {\n  position: absolute; inset: 0;\n  background: var(--magic-gradient);\n  overflow: hidden;\n}\n.hero-stage::after {\n  content: ''; position: absolute; inset: 0;\n  background:\n    radial-gradient(900px 700px at 18% 22%, rgba(255,255,255,0.22), transparent 60%),\n    radial-gradient(700px 500px at 90% 90%, rgba(0,0,0,0.18), transparent 60%);\n  pointer-events: none;\n}\n.hero-bar {\n  position: absolute; border-radius: 999px;\n  background: rgba(255,255,255,0.18); transform: rotate(-22deg);\n}\n.hero-bar.h1 { width: 1500px; height: 130px; top: 120px; right: -300px; }\n.hero-bar.h2 { width: 900px; height: 80px; bottom: 280px; left: -150px; opacity: 0.55; }\n.hero-bar.h3 { width: 500px; height: 50px; top: 60%; right: 30%; opacity: 0.4; }\n\n/* ---------- type ---------- */\n.display-1 { font-family: var(--font-display); font-weight: 900; font-size: 168px; line-height: 0.95; letter-spacing: -0.04em; }\n.display-2 { font-family: var(--font-display); font-weight: 900; font-size: 128px; line-height: 0.98; letter-spacing: -0.035em; }\n.title-xl  { font-family: var(--font-display); font-weight: 900; font-size: 96px;  line-height: 1.0;  letter-spacing: -0.03em; }\n.title-lg  { font-family: var(--font-display); font-weight: 800; font-size: 72px;  line-height: 1.05; letter-spacing: -0.025em; }\n.title-md  { font-family: var(--font-display); font-weight: 800; font-size: 56px;  line-height: 1.08; letter-spacing: -0.02em; }\n.title-sm  { font-family: var(--font-display); font-weight: 700; font-size: 40px;  line-height: 1.15; letter-spacing: -0.015em; }\n.lede      { font-size: 26px; font-weight: 300; line-height: 1.5; color: var(--fg-muted); }\n.lede.on-dark { color: rgba(255,255,255,0.85); }\n.body-deck { font-size: 22px; font-weight: 300; line-height: 1.55; color: var(--fg); }\n.body-muted { font-size: 20px; font-weight: 300; line-height: 1.55; color: var(--fg-muted); }\n.label-cap { font-size: 18px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-muted); }\n\n/* ---------- cards ---------- */\n.card {\n  background: #fff; border-radius: 28px; padding: 36px;\n  box-shadow: var(--shadow-md);\n}\n.card-tight { padding: 28px; border-radius: 24px; }\n.card-tinted { background: var(--ink-50); box-shadow: none; }\n.card-bordered { background: #fff; box-shadow: none; border: 1px solid var(--ink-200); }\n\n/* card with gradient stroke */\n.card-grad-border {\n  position: relative; background: #fff; border-radius: 28px; padding: 36px;\n}\n.card-grad-border::before {\n  content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.5px;\n  background: var(--magic-gradient);\n  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);\n  -webkit-mask-composite: xor; mask-composite: exclude;\n  pointer-events: none;\n}\n\n/* ---------- KPI / stat blocks ---------- */\n.stat-block { display: flex; flex-direction: column; gap: 6px; }\n.stat-value {\n  font-family: var(--font-display); font-weight: 900;\n  font-size: 112px; line-height: 0.98; letter-spacing: -0.04em;\n  background: var(--magic-gradient-h);\n  -webkit-background-clip: text; background-clip: text; color: transparent;\n}\n.stat-value.solid { background: none; -webkit-text-fill-color: var(--ink-900); color: var(--ink-900); }\n.stat-value.lg { font-size: 144px; }\n.stat-value.md { font-size: 84px; }\n.stat-value.sm { font-size: 64px; }\n.stat-label { font-size: 20px; font-weight: 500; color: var(--fg-muted); letter-spacing: 0.02em; }\n.stat-sub { font-size: 16px; color: var(--fg-subtle); font-weight: 300; margin-top: 2px; }\n\n/* small inline metric (chip) */\n.kpi-chip { background: #fff; border-radius: 24px; padding: 28px 32px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; gap: 8px; min-width: 220px; }\n.kpi-chip .v { font-family: var(--font-display); font-weight: 900; font-size: 64px; line-height: 1; letter-spacing: -0.03em; background: var(--magic-gradient-h); -webkit-background-clip: text; background-clip: text; color: transparent;
